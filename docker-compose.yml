services:
  # ─────────────────────────────────────────────
  # PicoClaw Agent (one-shot query)
  #   docker compose run --rm picoclaw-agent -m "Hello"
  # ─────────────────────────────────────────────
  picoclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picoclaw-agent
    profiles:
      - agent
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      - ./config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
    entrypoint: ["picoclaw", "agent"]
    stdin_open: true
    tty: true

  # ─────────────────────────────────────────────
  # PicoClaw Gateway (Long-running Bot)
  #   docker compose up picoclaw-gateway
  # ─────────────────────────────────────────────
  picoclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picoclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    ports:
      - "18790:18790"
    # Uncomment to access host network; leave commented unless needed.
    #extra_hosts:
    #  - "host.docker.internal:host-gateway"
    volumes:
      # Configuration file (read-only)
      - ./config/config.json:/home/picoclaw/.picoclaw/config.json:ro
      # Persistent data: workspace skills/templates, sessions, memory
      - picoclaw-workspace:/home/picoclaw/.picoclaw/workspace
      - picoclaw-sessions:/home/picoclaw/.picoclaw/sessions
      - picoclaw-memory:/home/picoclaw/.picoclaw/memory
    command: ["gateway"]

volumes:
  picoclaw-workspace:
  picoclaw-sessions:
  picoclaw-memory:
